name: starflow
description: Cross-platform personal streaming hub for NAS, Emby, Douban, and configurable online sources.
publish_to: none
version: 0.4.15+20
environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  archive: ^4.0.7
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  file_selector: ^1.0.3
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  http: ^1.5.0
  media_kit: ^1.2.6
  media_kit_libs_video: ^1.0.7
  media_kit_video: ^2.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  sembast: ^3.8.5+1
  sembast_web: ^2.4.2
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  xml: ^6.5.0
  flutter_svg: ^2.1.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

dependency_overrides:
  file_selector_android: 0.5.1+13
  path_provider_android: 2.2.10
  shared_preferences_android: 2.3.0
  url_launcher_android: 6.3.20
  wakelock_plus: 1.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/bootstrap/



















