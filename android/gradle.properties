org.gradle.jvmargs=-Xmx2G -Dfile.encoding=UTF-8 -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.workers.max=1
org.gradle.internal.http.connectionTimeout=180000
org.gradle.internal.http.socketTimeout=180000
android.useAndroidX=true
kotlin.compiler.execution.strategy=in-process
kotlin.incremental=false
kotlin.daemon.enabled=false

# If you use a local HTTP proxy, uncomment and fill these in.
