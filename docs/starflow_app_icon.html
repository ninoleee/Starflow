<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starflow App Icon Preview</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #08080f;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px;
    }

    .icon-preview {
      width: min(72vw, 520px);
      height: min(72vw, 520px);
      display: block;
    }
  </style>
</head>
<body>
  <img class="icon-preview" src="../assets/branding/starflow_icon_master.svg" alt="Starflow app icon">
</body>
</html>
