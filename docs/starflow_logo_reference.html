<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starflow Logo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #08080f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Syne', sans-serif;
      gap: 60px;
      padding: 48px 20px;
    }

    .label {
      color: #444;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .icon-container {
      position: relative;
      width: 96px;
      height: 96px;
    }

    .icon-bg {
      position: absolute;
      inset: 0;
      border-radius: 26px;
      background: linear-gradient(135deg, #0d1117 0%, #161b27 100%);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.6),
        inset 0 -14px 28px rgba(0, 0, 0, 0.18);
    }

    .icon-svg {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
    }

    .icon-container::before {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 38px;
      background: radial-gradient(
        ellipse at 50% 60%,
        rgba(100, 160, 255, 0.18) 0%,
        transparent 70%
      );
      animation: glowPulse 3s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.06); }
    }

    .wordmark {
      display: flex;
      align-items: baseline;
      gap: 1px;
      letter-spacing: -0.03em;
    }

    .word-star {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
    }

    .word-flow {
      font-size: 28px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: -0.04em;
    }

    .divider {
      width: 480px;
      max-width: 90vw;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.07);
    }

    .variants {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .variant-light {
      background: #f4f5f7;
      border-radius: 20px;
      padding: 32px 40px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .variant-light .icon-container {
      width: 44px;
      height: 44px;
    }

    .variant-light .icon-bg {
      border-radius: 12px;
      background: linear-gradient(135deg, #1a2236 0%, #243050 100%);
      border: none;
    }

    .variant-light .icon-container::before {
      display: none;
    }

    .variant-light .word-star {
      font-size: 22px;
      color: #111;
    }

    .variant-light .word-flow {
      font-size: 22px;
      color: rgba(0, 0, 0, 0.38);
    }

    .variant-small {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0d1117;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px 28px;
    }

    .variant-small .icon-container {
      width: 34px;
      height: 34px;
    }

    .variant-small .icon-bg {
      border-radius: 9px;
    }

    .variant-small .icon-container::before {
      display: none;
    }

    .variant-small .word-star,
    .variant-small .word-flow {
      font-size: 17px;
    }

    .variant-appicon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .variant-appicon .icon-container {
      width: 80px;
      height: 80px;
    }

    .variant-appicon .icon-bg {
      border-radius: 22px;
      background: linear-gradient(145deg, #1a2a4a 0%, #0d1525 100%);
    }

    @keyframes streamFlow {
      0% { stroke-dashoffset: 200; opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }

    .stream-line {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: streamFlow 2.4s ease-in-out infinite;
    }

    .stream-line:nth-child(1) { animation-delay: 0s; }
    .stream-line:nth-child(2) { animation-delay: 0.3s; }
    .stream-line:nth-child(3) { animation-delay: 0.6s; }

    @keyframes starTwinkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.88); }
    }

    .star-core {
      animation: starTwinkle 2.4s ease-in-out infinite;
      transform-origin: 48px 36px;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <span class="label">Primary Mark</span>

    <div class="icon-container">
      <div class="icon-bg"></div>
      <svg class="icon-svg" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path class="stream-line" d="M18 62 C28 62 32 52 42 52 C52 52 56 60 66 58 C72 57 76 53 80 50"
              stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path class="stream-line" d="M18 68 C30 68 34 56 46 56 C56 56 60 64 72 61 C76 60 79 57 82 54"
              stroke="url(#grad2)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        <path class="stream-line" d="M18 74 C32 74 36 62 50 62 C60 62 64 68 76 65"
              stroke="url(#grad3)" stroke-width="0.9" stroke-linecap="round" fill="none"/>

        <g class="star-core">
          <path d="M48 20 L50.4 33.6 L64 36 L50.4 38.4 L48 52 L45.6 38.4 L32 36 L45.6 33.6 Z"
                fill="url(#starFill)"/>
          <line x1="48" y1="16" x2="48" y2="22" stroke="rgba(180,210,255,0.6)" stroke-width="1" stroke-linecap="round"/>
          <line x1="48" y1="50" x2="48" y2="56" stroke="rgba(180,210,255,0.6)" stroke-width="1" stroke-linecap="round"/>
          <line x1="28" y1="36" x2="34" y2="36" stroke="rgba(180,210,255,0.6)" stroke-width="1" stroke-linecap="round"/>
          <line x1="62" y1="36" x2="68" y2="36" stroke="rgba(180,210,255,0.6)" stroke-width="1" stroke-linecap="round"/>
        </g>

        <defs>
          <linearGradient id="grad1" x1="18" y1="56" x2="80" y2="56" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#3d7fff" stop-opacity="0"/>
            <stop offset="40%" stop-color="#6eb3ff"/>
            <stop offset="100%" stop-color="#a5d0ff" stop-opacity="0.2"/>
          </linearGradient>
          <linearGradient id="grad2" x1="18" y1="62" x2="82" y2="62" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#2d5fe0" stop-opacity="0"/>
            <stop offset="40%" stop-color="#5599ee"/>
            <stop offset="100%" stop-color="#90c0ff" stop-opacity="0.2"/>
          </linearGradient>
          <linearGradient id="grad3" x1="18" y1="68" x2="76" y2="68" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1a3da8" stop-opacity="0"/>
            <stop offset="50%" stop-color="#4477cc"/>
            <stop offset="100%" stop-color="#7aacee" stop-opacity="0.15"/>
          </linearGradient>
          <linearGradient id="starFill" x1="32" y1="20" x2="64" y2="52" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#e8f4ff"/>
            <stop offset="100%" stop-color="#7ab8ff"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <div class="wordmark">
      <span class="word-star">Star</span><span class="word-flow">flow</span>
    </div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="label">Variants</span>
    <div class="divider-line"></div>
  </div>

  <div class="variants">
    <div class="variant-light">
      <div class="icon-container">
        <div class="icon-bg"></div>
        <svg class="icon-svg" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M48 20 L50.4 33.6 L64 36 L50.4 38.4 L48 52 L45.6 38.4 L32 36 L45.6 33.6 Z" fill="url(#starFill2)"/>
          <path d="M18 62 C28 62 32 52 42 52 C52 52 56 60 66 58 C72 57 76 53 80 50" stroke="url(#grad4)" stroke-width="2" stroke-linecap="round" fill="none"/>
          <path d="M18 68 C30 68 34 56 46 56 C56 56 60 64 72 61 C76 60 79 57 82 54" stroke="url(#grad4)" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.6"/>
          <defs>
            <linearGradient id="starFill2" x1="32" y1="20" x2="64" y2="52" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#e8f4ff"/>
              <stop offset="100%" stop-color="#7ab8ff"/>
            </linearGradient>
            <linearGradient id="grad4" x1="18" y1="60" x2="82" y2="60" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#3d7fff" stop-opacity="0.1"/>
              <stop offset="50%" stop-color="#5599ee"/>
              <stop offset="100%" stop-color="#90c0ff" stop-opacity="0.3"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="wordmark">
        <span class="word-star">Star</span><span class="word-flow">flow</span>
      </div>
    </div>

    <div class="variant-small">
      <div class="icon-container">
        <div class="icon-bg"></div>
        <svg class="icon-svg" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M48 20 L50.4 33.6 L64 36 L50.4 38.4 L48 52 L45.6 38.4 L32 36 L45.6 33.6 Z" fill="url(#starFill3)"/>
          <path d="M18 62 C28 62 32 52 42 52 C52 52 56 60 66 58 C72 57 76 53 80 50" stroke="url(#grad5)" stroke-width="2" stroke-linecap="round" fill="none"/>
          <defs>
            <linearGradient id="starFill3" x1="32" y1="20" x2="64" y2="52" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#e8f4ff"/>
              <stop offset="100%" stop-color="#7ab8ff"/>
            </linearGradient>
            <linearGradient id="grad5" x1="18" y1="60" x2="82" y2="60" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#3d7fff" stop-opacity="0"/>
              <stop offset="50%" stop-color="#6eb3ff"/>
              <stop offset="100%" stop-color="#a5d0ff" stop-opacity="0.2"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="wordmark">
        <span class="word-star">Star</span><span class="word-flow">flow</span>
      </div>
    </div>

    <div class="variant-appicon">
      <div class="icon-container">
        <div class="icon-bg"></div>
        <svg class="icon-svg" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M48 20 L50.4 33.6 L64 36 L50.4 38.4 L48 52 L45.6 38.4 L32 36 L45.6 33.6 Z" fill="url(#starFill4)"/>
          <line x1="48" y1="16" x2="48" y2="22" stroke="rgba(180,210,255,0.5)" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="48" y1="50" x2="48" y2="56" stroke="rgba(180,210,255,0.5)" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="28" y1="36" x2="34" y2="36" stroke="rgba(180,210,255,0.5)" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="62" y1="36" x2="68" y2="36" stroke="rgba(180,210,255,0.5)" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M18 62 C28 62 32 52 42 52 C52 52 56 60 66 58 C72 57 76 53 80 50" stroke="url(#grad6)" stroke-width="2" stroke-linecap="round" fill="none"/>
          <path d="M18 68 C30 68 34 56 46 56 C56 56 60 64 72 61 C76 60 79 57 82 54" stroke="url(#grad6)" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.6"/>
          <path d="M18 74 C32 74 36 62 50 62 C60 62 64 68 76 65" stroke="url(#grad6)" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0.35"/>
          <defs>
            <linearGradient id="starFill4" x1="32" y1="20" x2="64" y2="52" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#e8f4ff"/>
              <stop offset="100%" stop-color="#7ab8ff"/>
            </linearGradient>
            <linearGradient id="grad6" x1="18" y1="62" x2="82" y2="62" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#3d7fff" stop-opacity="0"/>
              <stop offset="45%" stop-color="#6eb3ff"/>
              <stop offset="100%" stop-color="#a5d0ff" stop-opacity="0.15"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="label">App icon</span>
    </div>
  </div>
</body>
</html>
