<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starflow TV Banner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #08080f;
      font-family: 'Syne', sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 22% 38%, rgba(100, 160, 255, 0.16), transparent 26%),
        radial-gradient(circle at 78% 28%, rgba(61, 127, 255, 0.08), transparent 18%),
        #08080f;
    }

    .banner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 44px;
      padding: 0 88px;
      transform: translateY(-8px);
    }

    .icon-shell {
      width: 280px;
      height: 280px;
      flex: 0 0 auto;
    }

    .icon-image {
      width: 100%;
      height: 100%;
      display: block;
    }

    .wordmark {
      display: flex;
      align-items: baseline;
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .word-star {
      font-size: 144px;
      font-weight: 800;
      color: #ffffff;
    }

    .word-flow {
      font-size: 144px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.45);
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="icon-shell">
      <img class="icon-image" src="../assets/branding/starflow_icon_master.svg" alt="Starflow icon">
    </div>

    <div class="wordmark">
      <span class="word-star">Star</span><span class="word-flow">flow</span>
    </div>
  </div>
</body>
</html>
